---
# Build image if tag in action.yml changes.
name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions: {}

jobs:
  check:
    name: Check if tag exists
    runs-on: ubuntu-24.04

    outputs:
      tag: ${{ steps.tag.outputs.version }}
      exists: ${{ steps.exists.outputs.exists }}

    permissions:
      contents: read

    env:
      REGISTRY: ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Get current tag
        id: tag
        run: |
          set -eu
          version=$(grep -oE "[0-9]+\.[0-9]+\.[0-9]+" action.yml)
          echo "version=v$version" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: exists
        run: |
          if docker image pull --quiet ${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.tag.outputs.version }}; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build
    runs-on: ubuntu-24.04
    needs: check
    if: ${{ needs.check.outputs.exists == 'false' }}
    
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write

    env:
      REGISTRY: ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup builder
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          provenance: mode=max
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:latest
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ needs.check.outputs.tag }}

      - name: Attest image
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
