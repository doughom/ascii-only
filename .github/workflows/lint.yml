---
name: Lint

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  ascii-only:
    name: ASCII Only
    runs-on: ubuntu-24.04

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: ASCII Only
        uses: ./
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
